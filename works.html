<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | Kazuki's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="works-page">
    <div class="cursor-follower"></div>
    
    <div class="bg-blur">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="fixed-nav glass">
        <a href="index.html">← Back to Home</a>
    </nav>

    <main class="works-container">
        <header class="works-header">
            <h1 class="reveal">Released Works</h1>
            <p class="reveal subtitle">Deep, Dub, and Minimal Soundscapes.</p>
        </header>

        <div class="works-grid">
            <article class="work-card reveal">
                <div class="work-image-container">
                    <div class="work-image ep02-cover"></div>
                </div>
                <div class="work-info">
                    <span class="category">Digital EP</span>
                    <h3>EP02</h3>
                    <p class="track-list">1. Just / 2. Frieren</p>
                    <p class="description">Ableton Live 12 Suite & Splice.</p>
                    <div class="meta">Released: Feb 18, 2026.</div>
                    <a href="https://yourlink.bandcamp.com" target="_blank" class="link-button">Listen on Bandcamp</a>
                </div>
            </article>

            <article class="work-card reveal opacity-low">
                <div class="work-image-container">
                    <div class="work-image dummy"></div>
                </div>
                <div class="work-info">
                    <span class="category">Upcoming</span>
                    <h3>New Project</h3>
                    <p class="description">New exploration of Deep & Minimal sounds.</p>
                </div>
            </article>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
